name: Algolia Provider Rollout

on:
  workflow_dispatch:
    inputs:
      apply_vercel_env:
        description: Sync Algolia env vars into Vercel production
        required: true
        default: true
        type: boolean
      deploy_production:
        description: Redeploy Vercel production after env sync
        required: true
        default: true
        type: boolean
      backfill_index:
        description: Backfill Algolia index from Supabase after deploy
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  rollout:
    runs-on: ubuntu-latest
    env:
      VERCEL_PROJECT_ID: prj_WwkxcoVClYZDp71ERhA1HmCaq2ee
      VERCEL_ORG_ID: team_7eU5928MpOB8p7W30xLozieg
      ALGOLIA_KEY_DESCRIPTION: KU BAZAR production server search key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_API_KEY: ${{ secrets.ALGOLIA_ADMIN_API_KEY }}
          ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
        run: |
          set -euo pipefail
          missing=0
          require_secret() {
            local name="$1"
            if [ -z "${!name:-}" ]; then
              echo "::error::${name} is missing"
              missing=1
            fi
          }
          require_secret VERCEL_TOKEN
          require_secret NEXT_PUBLIC_SUPABASE_URL
          require_secret SUPABASE_SERVICE_ROLE_KEY
          require_secret ALGOLIA_APP_ID
          require_secret ALGOLIA_ADMIN_API_KEY
          require_secret ALGOLIA_INDEX_NAME
          exit "$missing"

      - name: Resolve restricted Algolia search key
        env:
          ALGOLIA_SEARCH_API_KEY: ${{ secrets.ALGOLIA_SEARCH_API_KEY }}
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_API_KEY: ${{ secrets.ALGOLIA_ADMIN_API_KEY }}
          ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
        run: |
          node tools/scripts/algolia-search-key.mjs \
            --description "$ALGOLIA_KEY_DESCRIPTION" \
            --github-env-name ALGOLIA_SEARCH_API_KEY

      - name: Link Vercel project
        if: ${{ inputs.apply_vercel_env || inputs.deploy_production }}
        run: |
          set -euo pipefail
          mkdir -p .vercel
          cat > .vercel/project.json <<JSON
          {"projectId":"${VERCEL_PROJECT_ID}","orgId":"${VERCEL_ORG_ID}","projectName":"ku-online-dev"}
          JSON

      - name: Sync Algolia env into Vercel production
        if: ${{ inputs.apply_vercel_env }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_API_KEY: ${{ secrets.ALGOLIA_ADMIN_API_KEY }}
          ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
        run: |
          set -euo pipefail
          add_vercel_env() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error::${name} is empty"
              exit 1
            fi
            npx --yes vercel@54.9.1 env add "$name" production --force --yes --value "$value" --token "$VERCEL_TOKEN"
          }

          add_vercel_env ALGOLIA_APP_ID "$ALGOLIA_APP_ID"
          add_vercel_env ALGOLIA_ADMIN_API_KEY "$ALGOLIA_ADMIN_API_KEY"
          add_vercel_env ALGOLIA_SEARCH_API_KEY "$ALGOLIA_SEARCH_API_KEY"
          add_vercel_env ALGOLIA_INDEX_NAME "$ALGOLIA_INDEX_NAME"

      - name: Verify Vercel Algolia env values
        if: ${{ inputs.apply_vercel_env }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          env_file="$(mktemp)"
          trap 'rm -f "$env_file"' EXIT
          npx --yes vercel@54.9.1 env pull "$env_file" --environment=production --yes --token "$VERCEL_TOKEN"
          node - "$env_file" <<'NODE'
          const fs = require('node:fs');

          const file = process.argv[2];
          const required = [
            'ALGOLIA_APP_ID',
            'ALGOLIA_ADMIN_API_KEY',
            'ALGOLIA_SEARCH_API_KEY',
            'ALGOLIA_INDEX_NAME',
          ];

          const values = new Map();
          for (const line of fs.readFileSync(file, 'utf8').split(/\r?\n/)) {
            const trimmed = line.trim();
            if (!trimmed || trimmed.startsWith('#') || !trimmed.includes('=')) continue;
            const index = trimmed.indexOf('=');
            const key = trimmed.slice(0, index).trim();
            let value = trimmed.slice(index + 1).trim();
            if (
              (value.startsWith('"') && value.endsWith('"')) ||
              (value.startsWith("'") && value.endsWith("'"))
            ) {
              value = value.slice(1, -1);
            }
            values.set(key, value);
          }

          const missing = required.filter((key) => !values.get(key));
          if (missing.length > 0) {
            for (const key of missing) {
              console.error(`::error::${key} is missing or empty in Vercel production env after sync`);
            }
            process.exit(1);
          }

          console.log('Verified non-empty Vercel production Algolia env values.');
          NODE

      - name: Redeploy Vercel production
        if: ${{ inputs.deploy_production }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx --yes vercel@54.9.1 deploy --prod --yes --token "$VERCEL_TOKEN"

      - name: Backfill Algolia index from Supabase
        if: ${{ inputs.backfill_index }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_API_KEY: ${{ secrets.ALGOLIA_ADMIN_API_KEY }}
          ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
        run: node scripts/index-algolia-products.mjs
