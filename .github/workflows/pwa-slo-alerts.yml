name: PWA SLO Alerts

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-alert-check:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        id: validate
        env:
          ALERT_RUN_URL: ${{ secrets.PWA_SLO_ALERT_RUN_URL }}
          ALERT_SECRET: ${{ secrets.PWA_SLO_ALERT_SECRET }}
        run: |
          if [ -z "$ALERT_RUN_URL" ] || [ -z "$ALERT_SECRET" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Skipping PWA SLO alert check because required secrets are missing."
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Trigger PWA SLO alert check
        if: steps.validate.outputs.configured == 'true'
        env:
          ALERT_RUN_URL: ${{ secrets.PWA_SLO_ALERT_RUN_URL }}
          ALERT_SECRET: ${{ secrets.PWA_SLO_ALERT_SECRET }}
        run: |
          set -euo pipefail

          response_file="$(mktemp)"
          trap 'rm -f "$response_file"' EXIT

          set +e
          status_code="$(curl --show-error --silent \
            --output "$response_file" \
            --write-out "%{http_code}" \
            --request POST \
            --header "Authorization: Bearer $ALERT_SECRET" \
            --header "Content-Type: application/json" \
            "$ALERT_RUN_URL")"
          curl_exit=$?
          set -e

          if [ "$curl_exit" -ne 0 ]; then
            echo "PWA SLO alert check request failed before receiving a response. curl exit: $curl_exit"
            exit "$curl_exit"
          fi

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            echo "PWA SLO alert check failed with HTTP $status_code."
            echo "Response body:"
            head -c 4000 "$response_file" || true
            echo
            exit 1
          fi

          cat "$response_file"
